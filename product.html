<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sản phẩm | Băng Dính Việt Hàn</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary border-bottom py-3">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="images/page1_img0.png" alt="Việt Hàn Logo">
      </a>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto fw-medium">
          <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link active text-primary" href="shop.html">Sản phẩm</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">Giới thiệu</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Liên hệ</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
          <button id="theme-switch" class="theme-switch" aria-label="Đổi giao diện">
            <i class="bi bi-moon-fill"></i>
          </button>
          <a href="contact.html" class="btn btn-primary fw-semibold px-4">Báo giá</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Product Content -->
  <main class="flex-grow-1 py-5">
    <div class="container" id="product-detail-content">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div class="container mt-5 pt-5 border-top">
      <h3 class="fw-bold mb-4">Sản phẩm <span class="text-primary">Tương tự</span></h3>
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4" id="related-grid">
        <!-- Injected by JS -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-body-tertiary pt-5 pb-4 mt-auto">
    <div class="container">
      <div class="row g-4 mb-4">
        <div class="col-lg-4 col-md-6">
          <img src="images/page1_img0.png" alt="Logo" class="mb-4" style="height: 60px;">
          <h5 class="fw-bold mb-3">CÔNG TY TNHH BĂNG DÍNH VIỆT HÀN</h5>
        </div>
        <div class="col-lg-4 col-md-6">
          <h5 class="text-primary fw-bold mb-4">Sản Phẩm</h5>
          <ul class="list-unstyled d-flex flex-column gap-2">
            <li><a href="shop.html" class="text-body-secondary text-decoration-none">Băng dính đóng gói</a></li>
            <li><a href="shop.html" class="text-body-secondary text-decoration-none">Băng dính công nghiệp</a></li>
          </ul>
        </div>
        <div class="col-lg-4 col-md-12">
          <h5 class="text-primary fw-bold mb-4">Liên Hệ</h5>
          <ul class="list-unstyled text-body-secondary d-flex flex-column gap-3 mb-4">
            <li><i class="bi bi-telephone-fill me-2 text-primary"></i> 0582 160 999</li>
            <li><i class="bi bi-envelope-fill me-2 text-primary"></i> contact@viethantape.com</li>
          </ul>
        </div>
      </div>
      <div class="text-center text-body-secondary pt-4 border-top mt-4">
        <small>&copy; 2026 Băng Dính Việt Hàn.</small>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = parseInt(urlParams.get('id'));
      
      const product = products.find(p => p.id === productId);
      const contentContainer = document.getElementById('product-detail-content');
      
      if (!product) {
        contentContainer.innerHTML = `
          <div class="text-center py-5">
            <h1 class="text-primary display-5 fw-bold mb-3">404 - Không tìm thấy sản phẩm</h1>
            <p class="lead mb-4">Sản phẩm bạn tìm kiếm không tồn tại hoặc đã bị xóa.</p>
            <a href="shop.html" class="btn btn-primary px-4">Quay lại cửa hàng</a>
          </div>
        `;
        return;
      }

      document.title = `${product.name} | Băng Dính Việt Hàn`;

      contentContainer.innerHTML = `
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="shop.html" class="text-decoration-none">Sản phẩm</a></li>
            <li class="breadcrumb-item active" aria-current="page">${product.name}</li>
          </ol>
        </nav>

        <div class="row g-5">
          <div class="col-lg-6">
            <div class="bg-white p-4 rounded-3 shadow-sm border h-100 d-flex align-items-center justify-content-center">
              <img src="${product.image}" alt="${product.name}" class="img-fluid rounded">
            </div>
          </div>
          <div class="col-lg-6">
            <span class="badge bg-primary-subtle text-primary mb-3 px-3 py-2 fs-6 rounded-pill">${product.category}</span>
            <h1 class="display-5 fw-bold mb-2">${product.name}</h1>
            <h4 class="text-body-secondary fw-normal mb-4">${product.nameEn}</h4>
            
            <p class="lead mb-4 border-start border-primary border-4 ps-3">
              Sản phẩm <strong>${product.name}</strong> chất lượng cao từ Băng Dính Việt Hàn. Sản xuất trên dây chuyền công nghệ hiện đại, đáp ứng yêu cầu khắt khe về độ bám dính.
            </p>

            <table class="table table-bordered mb-4">
              <tbody>
                <tr>
                  <th class="bg-body-tertiary w-25">Nhà sản xuất</th>
                  <td>Việt Hàn Tape</td>
                </tr>
                <tr>
                  <th class="bg-body-tertiary">Tình trạng</th>
                  <td><span class="badge bg-success">Sẵn hàng số lượng lớn</span></td>
                </tr>
                <tr>
                  <th class="bg-body-tertiary">Đóng gói</th>
                  <td>Theo yêu cầu khách hàng</td>
                </tr>
              </tbody>
            </table>

            <div class="card border-primary shadow-sm">
              <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-3"><i class="bi bi-box-seam me-2 text-primary"></i>Yêu cầu báo giá / Nhận mẫu thử</h5>
                <p class="card-text text-body-secondary mb-4">Liên hệ trực tiếp với bộ phận kinh doanh B2B để nhận chính sách giá sỉ tốt nhất.</p>
                <div class="d-grid gap-2 d-md-flex">
                  <a href="tel:0582160999" class="btn btn-primary px-4 fw-semibold"><i class="bi bi-telephone-fill me-2"></i>0582 160 999</a>
                  <a href="https://zalo.me/0582160999" class="btn btn-outline-primary px-4 fw-semibold"><i class="bi bi-chat-dots-fill me-2"></i>Chat Zalo</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      const relatedGrid = document.getElementById('related-grid');
      const relatedProducts = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      if (relatedProducts.length < 4) {
        relatedProducts.push(...products.filter(p => p.id !== product.id && p.category !== product.category).slice(0, 4 - relatedProducts.length));
      }

      relatedProducts.forEach(p => {
        relatedGrid.innerHTML += `
          <div class="col">
            <div class="card h-100 shadow-sm border-0">
              <img src="${p.image}" class="card-img-top product-img border-bottom" alt="${p.name}">
              <div class="card-body d-flex flex-column">
                <span class="text-primary small fw-bold text-uppercase mb-2">${p.category}</span>
                <h5 class="card-title fs-6">${p.name}</h5>
                <a href="product.html?id=${p.id}" class="btn btn-sm btn-outline-primary mt-auto w-100">Chi tiết</a>
              </div>
            </div>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
